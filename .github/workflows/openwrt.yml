name: OpenWRT Build
on:
  workflow_dispatch:
    inputs:
      build_type:
        description: 'Build Type'
        required: true
        default: 'release'
      target_profile:
        description: 'Target Profile'
        required: false
        default: 'Generic x86_64'

jobs:
  build:
    runs-on: ubuntu-latest
    env:
      TZ: Asia/Shanghai
    steps:
      # 步骤1：检查环境
      - uses: actions/checkout@v2
      
      # 步骤2：设置编译环境
      - name: Setup environment
        run: |
          echo "开始配置编译环境..."
          sudo apt-get update
          sudo apt-get install -y \
            build-essential git subversion libncurses5-dev zlib1g-dev gawk gcc-multilib flex git-core device-tree-compiler quilt \
            bc bison gcc-multilib g++-multilib lib32gcc1 libssl-dev libncurses5-dev gperf python3-pip python3-dev \
            wget curl unzip rsync
          
          # 安装额外工具
          sudo pip3 install --upgrade setuptools wheel
          echo "环境配置完成"

      # 步骤3：获取源代码
      - name: Clone repository
        run: |
          echo "克隆OpenWRT源码..."
          https://github.com/openwrt/openwrt/tags
          cd lede
          
          # 配置feeds
          echo "src-git packages https://git.openwrt.org/feed/packages.git" >> feeds.conf.default
          echo "src-git luci https://git.openwrt.org/project/luci.git" >> feeds.conf.default
          echo "src-git routing https://git.openwrt.org/feed/routing.git" >> feeds.conf.default
          echo "src-git telephony https://git.openwrt.org/feed/telephony.git" >> feeds.conf.default
          
          # 更新feeds
          ./scripts/feeds update -a
          ./scripts/feeds install -a
          echo "Feeds更新完成"

      # 步骤4：配置固件
      - name: Configure firmware
        run: |
          echo "开始配置固件..."
          cp ../.config .
          make defconfig
          
          # 自动应用补丁
          if [ -d "../patches" ]; then
            echo "应用本地补丁..."
            for patch in ../patches/*.patch; do
              git apply "$patch"
            done
          fi
          
          echo "固件配置完成"

      # 步骤5：执行编译
      - name: Build
        run: |
          echo "开始编译固件..."
          make -j$(nproc) V=sc
          echo "编译完成"

      # 步骤6：上传产物
      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: openwrt-firmware
          path: bin/targets/x86/64/lede-x86-64-generic-squashfs-combined.efi.img

      # 步骤7：清理工作空间
      - name: Cleanup
        run: |
          echo "清理工作空间..."
          rm -rf ~/openwrt
          echo "清理完成"
