name: OpenWRT Build
on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    env:
      TZ: Asia/Shanghai
    steps:
      # 步骤1：下载仓库代码到GitHub虚拟机
      - uses: actions/checkout@v4

      # 步骤2：设置编译环境
      - name: Setup environment
        run: |
          echo "开始配置编译环境..."
          sudo apt update
          sudo apt install -y build-essential ccache fastjar file g++ gawk \
          gettext git libelf-dev libncurses5-dev libncursesw5-dev libssl-dev \
          python3 python3-dev rsync subversion swig time unzip wget \
          xsltproc zlib1g-dev

          # 配置ccache(加速后续编译,在当前工作流内有效)
          CCACHE_DIR="$RUNNER_TEMP/ccache"
          mkdir -p "$CCACHE_DIR"
          ccache --max-size=5G

          # 保存环境变量供后续步骤使用
          echo "CCACHE_DIR=$CCACHE_DIR" >> $GITHUB_ENV
          echo "PATH=/usr/lib/ccache:$PATH" >> $GITHUB_ENV

          # 显示ccache状态
          ccache --show-stats || true

          echo "✅ 环境配置完成"

      # 步骤3：克隆源代码并更新feed
      - name: Clone OpenWrt source
        run: |
          echo "克隆 OpenWrt 源码到 openwrt 目录"
          git clone -b openwrt-25.12 https://git.openwrt.org/openwrt/openwrt.git
          cd openwrt

          echo "开始复制自定义 Luci 应用到 package 目录..."
    
          # 逐个复制,如果失败就退出
          cp -r ../luci-app-nfs package/ || { echo "❌ 复制 luci-app-nfs 失败"; exit 1; }
          cp -r ../luci-app-poweroff package/ || { echo "❌ 复制 luci-app-poweroff 失败"; exit 1; }
          cp -r ../luci-app-rclone package/ || { echo "❌ 复制 luci-app-rclone 失败"; exit 1; }
          cp -r ../luci-app-tcpdump package/ || { echo "❌ 复制 luci-app-tcpdump 失败"; exit 1; }
          cp -r ../luci-app-tormanager package/ || { echo "❌ 复制 luci-app-tormanager 失败"; exit 1; }
    
          echo "✅ 所有应用复制成功"
    
          # 检查仓库根目录是否有 feeds.conf.default 没有则退出编译
          if [ ! -f ../feeds.conf.default ]; then
            echo "❌ 错误：未在根目录找到 feeds.conf.default 文件"
            echo "请确保仓库根目录包含 feeds.conf.default 配置文件"
            exit 1  # 退出编译，返回错误状态
          fi

          # 替换 feeds.conf.default
          cp ../feeds.conf.default .
          echo "✅ 已替换 feeds.conf.default"

          ./scripts/feeds update -a
          ./scripts/feeds install -a

          echo "✅ Feeds 更新完成"

      # 步骤4：配置固件
      - name: Configure firmware
        run: |
          echo "开始配置固件..."
          cd openwrt

          # 检查仓库根目录是否有 .config 没有则退出编译
          if [ ! -f ../.config ]; then
            echo "❌ 错误：未在根目录找到 .config 文件"
            echo "请确保仓库根目录包含 .config 配置文件"
            exit 1  # 退出编译，返回错误状态
          fi
    
          # 复制配置文件(如果有源文件会覆盖)
          cp ../.config .config
          echo "✅ 已复制 .config 到 openwrt中"

          echo "✅ 固件配置完成"

      # 步骤5：编译准备（tools + toolchain）
      - name: Build prepare
        run: |
          echo "开始编译准备阶段 (tools + toolchain)"
          cd openwrt

          # 持久化 ccache 配置
          echo "USE_CCACHE=1" >> $GITHUB_ENV
          echo "CCACHE_DIR=$RUNNER_TEMP/ccache" >> $GITHUB_ENV
          echo "CCACHE_MAXSIZE=5G" >> $GITHUB_ENV

          # 当前步骤也生效
          export USE_CCACHE=1
          export CCACHE_DIR="$RUNNER_TEMP/ccache"
          export CCACHE_MAXSIZE=5G

          # 编译准备(tools + toolchain)
          make prepare -j$(nproc) V=sc

          echo "✅ 准备阶段完成"

      # 步骤6：完整编译
      - name: Full compile
        run: |
          echo "开始完整编译"
          cd openwrt

          # ccache 配置已在步骤5持久化,这里不需要重复设置
          # 但需要导出以便当前步骤使用
          export USE_CCACHE=1
          export CCACHE_DIR="$RUNNER_TEMP/ccache"
          export CCACHE_MAXSIZE=5G

          # 创建日志目录
          mkdir -p ../build-logs

          # 编译并保存最后100行日志
          make -j$(nproc) V=sc 2>&1 | tee ../build-logs/full-build.log
          tail -100 ../build-logs/full-build.log > ../build-logs/last-100.log

          echo "✅ 固件编译完成"

      # 步骤7：验证固件生成
      - name: Verify firmware exists
        run: |
          echo "🔍 检查固件文件..."
          if [ -d "openwrt/bin/targets" ] && [ "$(ls -A openwrt/bin/targets)" ]; then
            echo "✅ 固件已生成"
            echo "📁 固件列表："
            find openwrt/bin/targets -type f \( -name "*.bin" -o -name "*.img" -o -name "*.gz" \) | while read f; do
              ls -lh "$f" | awk '{print $5 "\t" $9}'
            done
          else
            echo "❌ 错误：未找到固件文件"
            exit 1
          fi

      # 步骤8：上传固件
      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: openwrt-firmware
          path: |
            openwrt/bin/targets/**/*
            build-logs/last-100.log
        if: always()