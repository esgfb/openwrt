version: 2.1

jobs:
  build-openwrt:
    machine: true
    environment:
      TZ: Asia/Shanghai
    steps:
      - checkout
      
      # 第一步：安装 SDK 并保存路径
      - run: |
          echo "=== 安装 OpenWrt SDK 环境 ==="
          # 下载 SDK
          wget https://downloads.openwrt.org/releases/25.12.0/targets/x86/64/openwrt-sdk-25.12.0-x86-64_gcc-14.3.0_musl.Linux-x86_64.tar.zst
          # 解压（注意扩展名是 .zst）
          tar -xf openwrt-sdk-*.tar.zst
          # 删除下载的压缩包（也要用 .zst）
          rm openwrt-sdk-*.tar.zst
          # 进入解压后的目录并记录路径
          cd openwrt-sdk-*/
          SDK_PATH=$(pwd)
          echo "SDK_PATH=$SDK_PATH" >> $BASH_ENV
          echo "✅ SDK 安装完成，路径: $SDK_PATH"
      
      # 第二步：复制自定义应用和配置
      - run: |
          cd $SDK_PATH
          echo "=== 当前 SDK 目录: $(pwd) ==="
          
          # 复制自定义 Luci 应用（注意源路径）
          cp -r /home/circleci/project/luci-app-nfs package/ || { echo "❌ 复制 luci-app-nfs 失败"; exit 1; }
          cp -r /home/circleci/project/luci-app-poweroff package/ || { echo "❌ 复制 luci-app-poweroff 失败"; exit 1; }
          cp -r /home/circleci/project/luci-app-rclone package/ || { echo "❌ 复制 luci-app-rclone 失败"; exit 1; }
          cp -r /home/circleci/project/luci-app-tcpdump package/ || { echo "❌ 复制 luci-app-tcpdump 失败"; exit 1; }
          cp -r /home/circleci/project/luci-app-tormanager package/ || { echo "❌ 复制 luci-app-tormanager 失败"; exit 1; }
          
          # 追加 passwall 源
          echo "=== 添加 passwall feeds ==="
          grep -q "passwall_packages" feeds.conf.default || \
          echo "src-git passwall_packages https://github.com/Openwrt-Passwall/openwrt-passwall-packages.git;main" >> feeds.conf.default
          grep -q "passwall_luci" feeds.conf.default || \
          echo "src-git passwall_luci https://github.com/Openwrt-Passwall/openwrt-passwall.git;main" >> feeds.conf.default
          grep -q "passwall2_luci" feeds.conf.default || \
          echo "src-git passwall2_luci https://github.com/Openwrt-Passwall/openwrt-passwall2.git;main" >> feeds.conf.default
          
          # 更新 feeds
          echo "=== 更新 feeds ==="
          ./scripts/feeds update -a
          ./scripts/feeds install -a
          
          # 复制你的 .config（注意源路径）
          echo "=== 用你的 .config 覆盖默认配置 ==="
          cp -f /home/circleci/project/.config .config
          echo "✅ 已用你的配置覆盖 SDK 默认配置"
      
      # 第三步：编译准备
      - run: |
          cd $SDK_PATH
          echo "=== 运行 make defconfig ==="
          make defconfig
          echo "=== 运行 make prepare ==="
          make prepare -j2 V=sc
      
      # 第四步：完整编译
      - run: |
          cd $SDK_PATH
          echo "=== 开始完整编译 ==="
          mkdir -p /home/circleci/project/build-logs
          make -j2 V=sc 2>&1 | tee /home/circleci/project/build-logs/full-build.log
          tail -100 /home/circleci/project/build-logs/full-build.log > /home/circleci/project/build-logs/last-100.log
          echo "✅ 编译完成"
      
      # 第五步：保存固件
      - store_artifacts:
          path: $SDK_PATH/bin
          destination: openwrt-firmware
      
      - store_artifacts:
          path: /home/circleci/project/build-logs
          destination: build-logs

workflows:
  version: 2
  build-workflow:
    jobs:
      - build-openwrt:
          filters:
            branches:
              only: main
