version: 2.1

jobs:
  build-openwrt:
    machine: true
    environment:
      TZ: Asia/Shanghai
    steps:
      - checkout
      - run: pwd && ls -la && ls -la ..

workflows:
  version: 2
  build-workflow:
    jobs:
      - build-openwrt:
          filters:
            branches:
              only: main
