version: 2.1

jobs:
  build-openwrt:
    docker:
      - image: openwrt/sdk:x86-64  # 把 openwrtorg 改成 openwrt
    environment:
      TZ: Asia/Shanghai
    steps:
      - checkout
      - run: pwd && ls -la && ls -la ..

workflows:
  version: 2
  build-workflow:
    jobs:
      - build-openwrt:
          filters:
            branches:
              only: main
