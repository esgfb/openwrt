version: 2.1

jobs:
  build-openwrt:
    docker:
      - image: openwrt/sdk:25.12.0-x86-64
    environment:
      TZ: Asia/Shanghai
    steps:
      - checkout
      
      # 确认当前目录（只保留一个）
      - run: pwd && ls -la
      
      # 复制自定义 Luci 应用
      - run: |
          echo "=== 复制自定义应用到 package/ ==="
          cp -r luci-app-nfs package/ || { echo "❌ 复制 luci-app-nfs 失败"; exit 1; }
          cp -r luci-app-poweroff package/ || { echo "❌ 复制 luci-app-poweroff 失败"; exit 1; }
          cp -r luci-app-rclone package/ || { echo "❌ 复制 luci-app-rclone 失败"; exit 1; }
          cp -r luci-app-tcpdump package/ || { echo "❌ 复制 luci-app-tcpdump 失败"; exit 1; }
          cp -r luci-app-tormanager package/ || { echo "❌ 复制 luci-app-tormanager 失败"; exit 1; }
          
          # 追加 passwall 源到 feeds.conf.default
          echo "=== 添加 passwall feeds ==="
          grep -q "passwall_packages" feeds.conf.default || \
          echo "src-git passwall_packages https://github.com/Openwrt-Passwall/openwrt-passwall-packages.git;main" >> feeds.conf.default
          grep -q "passwall_luci" feeds.conf.default || \
          echo "src-git passwall_luci https://github.com/Openwrt-Passwall/openwrt-passwall.git;main" >> feeds.conf.default
          grep -q "passwall2_luci" feeds.conf.default || \
          echo "src-git passwall2_luci https://github.com/Openwrt-Passwall/openwrt-passwall2.git;main" >> feeds.conf.default
          
          # 更新 feeds（先更新，因为 .config 里可能引用这些源）
          echo "=== 更新 feeds ==="
          ./scripts/feeds update -a
          ./scripts/feeds install -a
          
          # **关键：更新完 feeds 后再复制 .config**
          echo "=== 用你的 .config 覆盖默认配置 ==="
          cp -f /builder/project/.config .config
          echo "✅ 已用你的配置覆盖 SDK 默认配置"
      
      # 编译准备
      - run: |
          echo "=== 运行 make defconfig ==="
          make defconfig
          echo "=== 运行 make prepare ==="
          make prepare -j2 V=sc
      
      # 完整编译
      - run: |
          echo "=== 开始完整编译 ==="
          mkdir -p ../build-logs
          make -j2 V=sc 2>&1 | tee ../build-logs/full-build.log
          tail -100 ../build-logs/full-build.log > ../build-logs/last-100.log
          echo "✅ 编译完成"
      
      # 保存固件
      - store_artifacts:
          path: ./bin
          destination: openwrt-firmware
      
      - store_artifacts:
          path: ../build-logs
          destination: build-logs

workflows:
  version: 2
  build-workflow:
    jobs:
      - build-openwrt:
          filters:
            branches:
              only: main
